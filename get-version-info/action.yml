name: 'Gets various Mono version info'
description: |
  Resolves and outputs Mono related version info used in other workflows e.g. hazelcast
  version updates in docs repos
    1. checkouts out Mono locally to get project version (can be skipped)
    2. sets the bundled MC version from JFrog downloaded `release.info-<version>.json`
       file (can be skipped)
inputs:
  release-version:
    description: 'The release version in progress'
    required: true
  skip-set-mc-version:
    description: 'Skip downloading and setting the bundled Management Center version'
    default: 'false'
  skip-checkout-mono:
    description: 'Bypasses the Git clone of hazelcast-mono and skips master version parsing'
    default: 'false'
  jfrog-files-repo:
    description: 'Jfrog preprod files repo'
    required: true
  aws-role-to-assume:
    description: 'AWS IAM Role ARN to assume via OIDC'
  github-token:
    description: 'The GitHub authentication token used for the GitHub CLI'
    required: true

outputs:
  master-version:
    description: 'The version parsed from master pom'
    value: ${{ steps.resolve-version.outputs.master-version }}
  master-major-minor:
    description: 'The major.minor parts of `master-version`'
    value: ${{ steps.resolve-version.outputs.master-major-minor }}
  rel-major-minor:
    description: 'The major.minor parts of `release-version`'
    value: ${{ steps.resolve-version.outputs.rel-major-minor }}
  mc-version:
    description: 'The Management Center version bundled with this release'
    value: ${{ steps.resolve-version.outputs.mc-version }}
  is-rel-major-minor:
    description: 'Returns true if the patch component of release-version is zero'
    value: ${{ steps.resolve-version.outputs.is-rel-major-minor }}
  is-latest-stable-release:
    description: 'Returns true if `release-version` (major.minor) is latest'
    value: ${{ steps.resolve-version.outputs.is-latest-stable-release }}
  is-beta-release:
    description: 'Returns true if `release-version` has `*-BETA-*` in the name'
    value: ${{ steps.resolve-version.outputs.is-beta-release }}

runs:
  using: 'composite'
  steps:
    - name: Setup folder and vars
      id: setup-folders-and-vars
      shell: bash
      run: |
        tmp_dir=$(mktemp -d)
        echo "tmp-dir=${tmp_dir}" >> ${GITHUB_OUTPUT}

        # Release info json file
        rel_info_file="release.info-${RELEASE_VERSION}.json"
        echo "rel_info_file=${tmp_dir}/${rel_info_file}" >> ${GITHUB_OUTPUT}
        echo "src-pattern=${JFROG_REPO}/hazelcast-enterprise/${rel_info_file}" >> ${GITHUB_OUTPUT}

        # Unique folder for Mono checkout
        echo "mono-dir=mono-temp.${RANDOM}" >> ${GITHUB_OUTPUT}
      env:
        RELEASE_VERSION: ${{ inputs.release-version }}
        JFROG_REPO: ${{ inputs.jfrog-files-repo }}

    - name: Checkout Hazelcast Mono
      if: ${{ inputs.skip-checkout-mono == 'false' }}
      uses: actions/checkout@v7
      with:
        repository: ${{ github.repository_owner }}/hazelcast-mono
        path: ${{ steps.setup-folders-and-vars.outputs.mono-dir }}
        token: ${{ inputs.github-token }}
        fetch-depth: 1

    - name: Download bundled MC version marker file
      if: ${{ inputs.skip-set-mc-version == 'false' }}
      uses: hazelcast/mono-actions/invoke-jfrog-cli@main
      with:
        command: 'download'
        src-pattern: ${{ steps.setup-folders-and-vars.outputs.src-pattern }}
        target-path: ${{ steps.setup-folders-and-vars.outputs.tmp-dir }}/
        explode: false
        expected-count: '1'
        aws-role-to-assume: ${{ inputs.aws-role-to-assume }}

    - name: Set versions
      id: resolve-version
      shell: bash
      run: |
        set -o errexit -o nounset -o pipefail ${RUNNER_DEBUG:+-x}

        source "${GITHUB_ACTION_PATH}/scripts/get.version.info.sh"

        mc_version="0.0.0"
        if [[ "${SKIP_SET_MC_VERSION}" == "false" ]]; then
          mc_version=$(jq -r '."mc-version"' ${REL_INFO_FILE})
        fi

        master_ver="0.0.0"
        master_mm="0.0"
        if [[ "${SKIP_CHECKOUT_MONO}" == "false" ]]; then
          master_ver=$(get_master_version "${MONO_PATH}")
          master_mm=$(get_major_minor_parts "${master_ver}")
        fi

        echo "master-version=${master_ver}" >> ${GITHUB_OUTPUT}
        echo "master-major-minor=${master_mm}" >> ${GITHUB_OUTPUT}
        echo "rel-major-minor=$(get_major_minor_parts $RELEASE_VERSION)" >> ${GITHUB_OUTPUT}
        echo "mc-version=${mc_version}" >> ${GITHUB_OUTPUT}
        echo "is-latest-stable-release=$(is_latest_stable_release $RELEASE_VERSION $REPO_OWNER)" >> ${GITHUB_OUTPUT}
        echo "is-beta-release=$(is_beta_release $RELEASE_VERSION)" >> ${GITHUB_OUTPUT}
        echo "is-rel-major-minor=$(is_major_minor $RELEASE_VERSION)" >> ${GITHUB_OUTPUT}
      env:
        RELEASE_VERSION: ${{ inputs.release-version }}
        REPO_OWNER: ${{ github.repository_owner }}
        MONO_PATH: ${{ steps.setup-folders-and-vars.outputs.mono-dir }}
        REL_INFO_FILE: ${{ steps.setup-folders-and-vars.outputs.rel_info_file }}
        SKIP_SET_MC_VERSION: ${{ inputs.skip-set-mc-version }}
        SKIP_CHECKOUT_MONO: ${{ inputs.skip-checkout-mono }}
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Log version variables
      shell: bash
      run: |
        echo "========================================="
        echo "   GET-VERSION-INFO OUTPUT VARIABLES"
        echo "========================================="
        echo "master-version:           ${MASTER_VERSION}"
        echo "master-major-minor:       ${MASTER_MAJOR_MINOR}"
        echo "rel-major-minor:          ${REL_MAJOR_MINOR}"
        echo "mc-version:               ${MC_VERSION}"
        echo "is-beta-release:          ${IS_BETA_RELEASE}"
        echo "is-rel-major-minor:       ${IS_REL_MAJOR_MINOR}"
        echo "is-latest-stable-release: ${IS_LATEST_STABLE_RELEASE}"
        echo "========================================="
      env:
        MASTER_VERSION: ${{ steps.resolve-version.outputs.master-version }}
        MASTER_MAJOR_MINOR: ${{ steps.resolve-version.outputs.master-major-minor }}
        REL_MAJOR_MINOR: ${{ steps.resolve-version.outputs.rel-major-minor }}
        MC_VERSION: ${{ steps.resolve-version.outputs.mc-version }}
        IS_LATEST_STABLE_RELEASE: ${{ steps.resolve-version.outputs.is-latest-stable-release }}
        IS_BETA_RELEASE: ${{ steps.resolve-version.outputs.is-beta-release }}
        IS_REL_MAJOR_MINOR: ${{ steps.resolve-version.outputs.is-rel-major-minor }}
