name: Test execute-jfrog-cli action

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate AQL
        id: generate-aql
        run: |
          echo "query<<EOF" >> $GITHUB_OUTPUT
          items.find({
            "repo": "download",
            "path": "hazelcast-enterprise",
            "\$or": [
              {"name": "hazelcast-enterprise-5.0.1-slim.zip"},
              {"name": "hazelcast-enterprise-5.0.2-slim.zip"}
            ]
          })
          EOF
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AQL files Download
        uses: ./execute-jfrog-cli
        with:
          command: 'download'
          aql: ${{ steps.generate-aql.outputs.query }}
          target-dir: '/tmp/aql-download'
          expected-count: '2'

      - name: Direct File Download
        uses: ./execute-jfrog-cli
        with:
          command: 'download'
          src-pattern: 'download/hazelcast-enterprise/hazelcast-enterprise-5.0.1-slim.zip'
          target-dir: '/tmp/file-download'
          expected-count: '1'

      - name: Create local temporary file for upload
        run: |
          mkdir -p /tmp/local-upload-source
          echo "Test content created on $(date)" > /tmp/local-upload-source/test-upload-artifact.txt

      - name: Upload file
        uses: ./execute-jfrog-cli
        with:
          command: 'upload'
          src-pattern: '/tmp/local-upload-source/test-upload-artifact.txt'
          target-dir: 'sandbox-files-preprod/hazelcast-enterprise'
          expected-count: '1'

      - name: Copy via AQL
        uses: ./execute-jfrog-cli
        with:
          command: 'copy'
          aql: 'items.find({"repo": "sandbox-files-preprod", "path": "hazelcast-enterprise", "name": "test-upload-artifact.txt"})'
          spec-vars: 'target=sandbox-files-preprod/hazelcast-enterprise/copied-folder/'
          expected-count: '1'

      - name: Test outputs
        run: |
          source /dev/stdin <<< "$(curl --silent https://raw.githubusercontent.com/hazelcast/assert.sh/main/assert.sh)"

          TESTS_RESULT=0

          assert_file_exists() {
              local target_file=$1
              local track=$2
              local exists="false"
              [ -f "${target_file}" ] && exists="true"
              assert_true "${exists}" "Expected file missing for context: [${track}]. Path: ${target_file}" || TESTS_RESULT=$?
          }

          # Assert downloads
          assert_file_exists "/tmp/aql-download/hazelcast-enterprise-5.0.1-slim.zip" "AQL Download 5.0.1"
          assert_file_exists "/tmp/aql-download/hazelcast-enterprise-5.0.2-slim.zip" "AQL Download 5.0.2"
          assert_file_exists "/tmp/file-download/hazelcast-enterprise-5.0.1-slim.zip" "Direct File Download"

          # Assert sizes
          SIZE_AQL=$(stat -c%s "/tmp/aql-download/hazelcast-enterprise-5.0.1-slim.zip" 2>/dev/null || echo "0")
          SIZE_FILE=$(stat -c%s "/tmp/file-download/hazelcast-enterprise-5.0.1-slim.zip" 2>/dev/null || echo "1")
          assert_eq "${SIZE_AQL}" "${SIZE_FILE}" "Downloaded files do not match in byte size" || TESTS_RESULT=$?

          assert_eq 0 "$TESTS_RESULT" "All tests should pass"
