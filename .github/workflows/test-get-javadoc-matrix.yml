name: Test setup-maven action

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get matrix (ALL)
        id: get-javadoc-matrix-all
        uses: ./get-javadoc-matrix
        with:
          release-type: 'ALL'

      - name: Get matrix (OSS)
        id: get-javadoc-matrix-oss
        uses: ./get-javadoc-matrix
        with:
          release-type: 'OSS'

      - name: Get matrix (EE)
        id: get-javadoc-matrix-ee
        uses: ./get-javadoc-matrix
        with:
          release-type: 'EE'

      - name: Test outputs
        run: |
          source /dev/stdin <<< "$(curl --silent https://raw.githubusercontent.com/hazelcast/assert.sh/main/assert.sh)"

          TESTS_RESULT=0

          assert_field_by_label() {
              # Generic function to test single JSON field by label. The same field will exist
              # for 'ALL' and the test asserts the field against expected label
              local label=$1
              local field=$2
              local field_value=$3
              local matrix=$4

              local has_field=$(echo "${matrix}" | jq \
                  --arg field "${field}" \
                  --arg fieldVal "${field_value}" \
                  --arg lbl "${label}" \
                  'any(.[]; .[$field] == $fieldVal and .label == $lbl)')

              assert_true "${has_field}" "'${field}=${field_value}' is missing/incorrect for label '${label}'" || TESTS_RESULT=$?
          }

          assert_label() {
              local label=$1
              local actual_matrix=$2
              local has_label=$(echo "${actual_matrix}" | jq --arg lbl "${label}" 'any(.[]; .label == $lbl)')
              assert_true "${has_label}" "label '${label}' is missing" || TESTS_RESULT=$?
          }

          # Assert 'label'
          assert_label 'oss' '${{ steps.get-javadoc-matrix-oss.outputs.json }}'
          assert_label 'oss' '${{ steps.get-javadoc-matrix-all.outputs.json }}'
          assert_label 'ee' '${{ steps.get-javadoc-matrix-all.outputs.json }}'
          assert_label 'ee' '${{ steps.get-javadoc-matrix-ee.outputs.json }}'

          FIELD="remote-root"
          assert_field_by_label 'oss' "${FIELD}" 'hazelcast-docs' '${{ steps.get-javadoc-matrix-oss.outputs.json }}'
          assert_field_by_label 'oss' "${FIELD}" 'hazelcast-docs' '${{ steps.get-javadoc-matrix-all.outputs.json }}'
          assert_field_by_label 'ee' "${FIELD}" 'hazelcast-ee-docs' '${{ steps.get-javadoc-matrix-ee.outputs.json }}'
          assert_field_by_label 'ee' "${FIELD}" 'hazelcast-ee-docs' '${{ steps.get-javadoc-matrix-all.outputs.json }}'

          FIELD="local-root"
          assert_field_by_label 'oss' "${FIELD}" 'hazelcast' '${{ steps.get-javadoc-matrix-oss.outputs.json }}'
          assert_field_by_label 'oss' "${FIELD}" 'hazelcast' '${{ steps.get-javadoc-matrix-all.outputs.json }}'
          assert_field_by_label 'ee' "${FIELD}" '.' '${{ steps.get-javadoc-matrix-ee.outputs.json }}'
          assert_field_by_label 'ee' "${FIELD}" '.' '${{ steps.get-javadoc-matrix-all.outputs.json }}'

          FIELD="mvn-options"
          assert_field_by_label 'oss' "${FIELD}" '' '${{ steps.get-javadoc-matrix-oss.outputs.json }}'
          assert_field_by_label 'oss' "${FIELD}" '' '${{ steps.get-javadoc-matrix-all.outputs.json }}'
          assert_field_by_label 'ee' "${FIELD}" '-P-os-hazelcast' '${{ steps.get-javadoc-matrix-ee.outputs.json }}'
          assert_field_by_label 'ee' "${FIELD}" '-P-os-hazelcast' '${{ steps.get-javadoc-matrix-all.outputs.json }}'

          assert_eq 0 "$TESTS_RESULT" "All tests should pass"
