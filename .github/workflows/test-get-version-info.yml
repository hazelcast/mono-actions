name: Test get-version-info action

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current action repository
        uses: actions/checkout@v7

      - name: Run Action Smoke Test
        id: test-action
        uses: ./get-version-info
        with:
          release-version: '5.5.0'
          github-token: ${{ secrets.GH_TOKEN }}
          jfrog-files-repo: ${{ vars.JFROG_PREPROD_FILES_REPO }}
          aws-role-to-assume: ${{ vars.AWS_HAZELCAST_OIDC_GITHUB_ACTIONS_ROLE_ARN }}
          skip-set-mc-version: 'true'

      - name: Validate outputs
        run: |
          source /dev/stdin <<< "$(curl --silent https://raw.githubusercontent.com/hazelcast/assert.sh/main/assert.sh)"

          TESTS_RESULT=0

          log_header "Verifying Action Smoke Test Output Flags"

          # Assertions for version string contents
          assert_not_empty "${SUITE_MASTER_VER}" "master-version should be populated" || TESTS_RESULT=$?
          assert_not_empty "${SUITE_MASTER_MM}" "master-major-minor should be populated" || TESTS_RESULT=$?
          assert_not_empty "${SUITE_REL_MM}" "rel-major-minor should be populated" || TESTS_RESULT=$?

          # Assertions for bundled-mc-version (Verifies that it defaults to 0.0.0 correctly when skipped)
          assert_not_empty "${SUITE_BUNDLED_MC_VER}" "bundled-mc-version should be populated" || TESTS_RESULT=$?
          assert_eq "0.0.0" "${SUITE_BUNDLED_MC_VER}" "bundled-mc-version should be 0.0.0 when skipped" || TESTS_RESULT=$?

          # Assertions for boolean status flags
          assert_not_empty "${SUITE_LATEST_STABLE}" "is-latest-stable-release should be populated" || TESTS_RESULT=$?
          assert_not_empty "${SUITE_BETA_RELEASE}" "is-beta-release should be populated" || TESTS_RESULT=$?
          assert_not_empty "${SUITE_IS_MAJOR_MINOR}" "is-rel-major-minor should be populated" || TESTS_RESULT=$?

          assert_eq 0 "$TESTS_RESULT" "All tests should pass"
        env:
          SUITE_MASTER_VER: ${{ steps.test-action.outputs.master-version }}
          SUITE_MASTER_MM: ${{ steps.test-action.outputs.master-major-minor }}
          SUITE_REL_MM: ${{ steps.test-action.outputs.rel-major-minor }}
          SUITE_BUNDLED_MC_VER: ${{ steps.test-action.outputs.bundled-mc-version }}
          SUITE_LATEST_STABLE: ${{ steps.test-action.outputs.is-latest-stable-release }}
          SUITE_BETA_RELEASE: ${{ steps.test-action.outputs.is-beta-release }}
          SUITE_IS_MAJOR_MINOR: ${{ steps.test-action.outputs.is-rel-major-minor }}
