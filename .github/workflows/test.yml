name: Test All
on:
  pull_request:
  workflow_dispatch:

jobs:
  test-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

  test-setup-maven:
    uses: ./.github/workflows/test-setup-maven.yml
    secrets: inherit

  test-get-javadoc-matrix:
    uses: ./.github/workflows/test-get-javadoc-matrix.yml
    secrets: inherit

  assert-all-jobs-succeeded:
    runs-on: ubuntu-latest
    needs:
      - test-setup-maven
      - test-get-javadoc-matrix
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "❌ Some jobs failed or were cancelled"
            exit 1
          else
            echo "✅ All jobs completed successfully!"
          fi