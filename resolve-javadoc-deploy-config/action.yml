# GitHub Action to generate JavaDoc workflow deploy config (JSON) for distributed jobs
# The config is used for parallelizing OS/EE JavaDoc generation during 'package.yml' and
# 'promote.yml' phases. The JSON computation has been centralized here to avoid
# duplication in the calling workflows

name: Resolve JavaDoc deploy config

inputs:
  release-type:
    description: 'Type of Edition ALL|OSS|EE'
    required: false

outputs:
  json:
    value: ${{ steps.compute-config.outputs.json }}

runs:
  using: composite
  steps:
      - name: Resolve editions
        id: resolve-editions
        uses: hazelcast/docker-actions/resolve-editions@master
        with:
          release-type: ${{ inputs.release-type }}

      - name: Compute config
        id: compute-config
        shell: bash
        run: |
          oss_json='{
            "label": "oss",
            "local-root": "hazelcast",
            "remote-root": "hazelcast-docs",
            "mvn-options": ""
          }'

          ee_json='{
            "label": "ee",
            "local-root": ".",
            "remote-root": "hazelcast-ee-docs",
            "mvn-options": "-P-os-hazelcast"
          }'

          matrix=()
        
          if [[ "${{ steps.resolve-editions.outputs.should_build_oss }}" == "true" ]]; then
              matrix+=($(echo "${oss_json}" | jq --compact-output '.'))
          fi

          if [[ "${{ steps.resolve-editions.outputs.should_build_ee }}" == "true" ]]; then
              matrix+=($(echo "${ee_json}" | jq --compact-output '.'))
          fi

          json="[$(IFS=,; echo "${matrix[*]}")]"
          echo "json=${json}" >> "${GITHUB_OUTPUT}"
