name: Delete tag

inputs:
  token:
    required: true
  repository:
    required: true
  slack-webhook-url:
    required: true
  slack-channel:
    required: true

runs:
  using: composite
  steps:
    - name: Delete '${{ github.event.ref }}' tag from ${{ inputs.repository }} repository
      shell: bash
      run: |
        # Remove only well known tags, the regex below covers the following patterns:
        #  - "v[0-9]+.[0-9]+.[0-9]"
        #  - "v[0-9]+.[0-9]+.[0-9]+-BETA-[0-9]+"
        if [[ ${TAG_NAME} =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-BETA-[0-9]+)?$ ]]; then
          if gh api "repos/${REPOSITORY}/git/refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Deleting tag '${TAG_NAME}' from '${REPOSITORY}' repository"
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPOSITORY}/git/refs/tags/${TAG_NAME}"
          else
            echo "Tag '${TAG_NAME}' does not exist in '${REPOSITORY}' repository"
          fi
        else
          echo "Tag '${TAG_NAME}' does not match pattern. Skipping"
        fi
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPOSITORY: ${{ inputs.repository }}
        TAG_NAME: ${{ github.event.ref }}

    - uses: hazelcast/docker-actions/slack-notification@master
      if: failure()
      with:
        slack-webhook-url: ${{ inputs.slack-webhook-url }}
        slack-channel: ${{ inputs.slack-channel }}
